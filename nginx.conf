server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache static assets (everything hashed by Astro)
    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?|ttf|otf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML / route requests — prefer exact file, then directory's index, then home
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
